
services:
  mysql:
    image: mysql:8.0
    container_name: staff-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: sams_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - staff-network

  backend:
    build:
      context: ./sams-backend
    image: staff-management-backend:v1
    container_name: staff-backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8081:80"
    networks:
      - staff-network

  frontend:
    build:
      context: ./sams-frontend
    image: staff-management-frontend:v1
    container_name: staff-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - staff-network

volumes:
  mysql-data:

networks:
  staff-network:
    driver: bridge