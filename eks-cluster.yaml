apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: staff-management-cluster
  region: ap-northeast-1
  version: "1.34"

managedNodeGroups:
  - name: staff-worker-nodes
    instanceType: c7i-flex.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20

    labels:
      role: worker

    tags:
      project: staff-management-system
      environment: dev